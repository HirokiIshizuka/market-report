name: Daily Market Report

on:
  schedule:
    # 平日 UTC 0:00 = 日本時間 9:00 AM（月〜金）
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate market report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-20250514
          ANTHROPIC_FALLBACK_MODEL: claude-opus-4-20250514
          ANTHROPIC_MAX_OUTPUT_TOKENS: '3500'
          FORCE_GENERATE: '0'
        run: python generate_report.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Update market report $(date -u +%Y-%m-%d)"
          git push
